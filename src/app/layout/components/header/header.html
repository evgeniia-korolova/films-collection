<div class="header-container">
  <nav class="nav">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="logo"
      aria-label="Back home"
      title="Home"
      >🏠</a
    >

    <a
      routerLink="/about"
      routerLinkActive="active"
      class="about-link"
      aria-label="About page"
      title="About"
    >
      ℹ️
    </a>

    <a
      routerLink="/favorites"
      routerLinkActive="active"
      class="favorites-link"
      aria-label="List of favorite films"
      title="Favorite"
    >
      <span class="icon">{{ filmService.favoriteFilms().length > 0 ? '❤️' : '🤍' }}</span>

      @if (filmService.favoriteFilms().length > 0) {
        <span class="count">{{ filmService.favoriteFilms().length }}</span>
      }
    </a>
  </nav>
  <button (click)="toggleTheme.emit()" class="theme-toggle">
    {{ themeService.theme() === 'light' ? '🌙' : '☀️' }}
  </button>
</div>
